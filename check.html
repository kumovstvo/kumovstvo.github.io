<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Главная | Система &laquo;Кумовство&raquo;</title>
  <link rel="stylesheet" type="text/css" href="./css/main.css">
  <link rel="stylesheet" type="text/css" href="./css/header.css">
  <link rel="stylesheet" type="text/css" href="./css/achTable.css">
</head>
<body>
  <header>
    <a href="/" class="header-logo">КУМОВСТВО</a>
    <ul id="headNav">
      <li class="headNavItem">
        <a href="./check/">Проверить льготы</a>
      </li>
      <li class="headNavItem">
        <a href="/olymp/">Все льготы вуза</a>
      </li>
      <li class="headNavItem">
        <a href="/feedback/">Обратная связь</a>
      </li>
    </ul>
  </header>
  <div id="content">
    Ваши достижения:
    <table class="achTable" id="achTable">
      <tr>
        <th class="achName">Достижение</th> 
        <th class="achProfile">Профиль</th>
        <th class="achStatus">Статус</th>
        <th class="achClass">Класс</th>
        <th class="achYear">Тип</th>
      </tr>
      <tr>
        <td class="achName">Открытая олимпиада школьников</td>
        <td class="achProfile">информатика</td>
        <td class="achStatus">Победитель</td>
        <td class="achClass">10</td>
        <td class="achYear">2023-24</td>
      </tr>
    </table>
    <form onsubmit="return false;">
      <select id="selectList">
        <option value="*" disabled selected>Выберите тип достижения</option>
        <option value="vsosh.csv">ВсОШ</option>
        <option value="rsosh-20_21.csv">РСОШ 2020-21</option>
        <option value="rsosh-21_22.csv">РСОШ 2021-22</option>
        <option value="rsosh-22_23.csv">РСОШ 2022-23</option>
        <option value="rsosh-23_24.csv">РСОШ 2023-24</option>
      </select>
      <select id="selectStatus">
        <option value="*" disabled selected>Выберите ваш статут</option>
        <option value="P">Призёр</option>
        <option value="W">Победитель</option>
      </select>
      <select id="selectClass">
        <option value="*" disabled selected>Класс участия</option>
        <option value="9">9</option>
        <option value="10">10</option>
        <option value="11">11</option>
      </select>
      <select value="*" id="selectOlymp" style="display:block; width: 100%;">
        <option disabled selected>Выберите достижение</option>
      </select>
      <select id="selectProfile">
        <option value="*" disabled selected>Выберите профиль достижения</option>
      </select>
      <button onclick="addAch()">Добавить</button>

      <script src="js/loadOlymps.js"></script>
    </form>
  </div>
</body>
</html>
